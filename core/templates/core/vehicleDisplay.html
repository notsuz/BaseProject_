{% extends "base.html" %}
{% load static %}
{% block content %}


<section class="hero-wrap hero-wrap-2 js-fullheight" style="position: relative; overflow: hidden;">

	<img src="{% static 'images/bg_3.jpg' %} " alt="Hero Background"
		style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;">

	<div class="overlay"
		style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1;">
	</div>

	<div class="container" style="position: relative; z-index: 2;">
		<div class="row no-gutters slider-text js-fullheight align-items-end justify-content-start">
			<div class="col-md-9 ftco-animate pb-5">
				<p class="breadcrumbs">
					<span class="mr-2"><a href="index.html" class="text-white">Home <i
								class="ion-ios-arrow-forward"></i></a></span>
					<span class="text-white">Cars <i class="ion-ios-arrow-forward"></i></span>
				</p>
				<h1 class="mb-3 bread text-white">Choose Your Car</h1>
			</div>
		</div>
	</div>

</section>


<section class="ftco-section bg-light">
	<div class="container">
		<div class="row">
			{% for i in vehicle %}
			<div class="col-md-4">
				<div class="car-wrap rounded shadow-sm pb-3">
					  
					
					<div class="img rounded" style="position: relative; width: 100%; height: 240px; overflow: hidden;">
						<img src="{{i.image.url}}" alt="Mercedes Grand Sedan"
							style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;">
					</div>

					<div class="text px-4 pt-4">
						<h2 class="mb-0"><a href="car-single.html">{{i.title|safe|truncatechars:25}}</a></h2>
						<div class="d-flex mb-3">
							<span class="cat">{{i.vehicle_type}}</span>
							<p class="price ml-auto">Rs. {{i.price_per_day}} <span>/day</span></p>
						</div>
						<p class="d-flex mb-0 d-block">
							<a href="{% url 'book_vehicle' i.id %}" class="btn btn-primary py-2 mr-1">Book now</a>
							<a href="{% url 'carsingle' i.id %}" class="btn btn-secondary py-2 ml-1">Details</a>
						</p>
					</div>

				</div>
			</div>
			{% endfor %}
		</div>
		
	</div>
</section>


{% endblock content %}
